<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Kasir Sederhana</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
    h1,h2 { margin-top:30px; }
    .box { background:#fff; padding:15px; border-radius:8px; margin-bottom:20px; box-shadow:0 2px 6px rgba(0,0,0,.1); }
    label { display:block; margin-top:10px; font-size:18px; font-weight:bold; }
    input, button, select { padding:12px; margin-top:5px; width:100%; font-size:18px; }
    button { background:#2d89ef; color:#fff; border:none; border-radius:5px; cursor:pointer; }
    button:hover { background:#1b5fbf; }
    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { border:1px solid #ccc; padding:6px; text-align:center; font-size:14px; }
    th { background:#eee; }
    .danger { background:#e74c3c; }
    .success { background:#27ae60; }
  </style>
</head>
<body>

<h1>Aplikasi Kasir Sederhana</h1>

<div class="box">
  <h2>Tambah Produk</h2>
  <label>Nama Produk</label>
  <input type="text" id="namaProduk" oninput="this.value = this.value.replace(/(^|\s)\S/g, t => t.toUpperCase())" />

  <label>Harga Beli</label>
  <input type="text" id="hargaBeli" oninput="formatInputRupiah(this)" />

  <label>Harga Jual</label>
  <input type="text" id="hargaJual" oninput="formatInputRupiah(this)" />

  <label>Stok</label>
  <input type="number" id="stok" />

  <button onclick="tambahProduk()">Tambah Produk</button>
</div>

<div class="box">
  <h2>Daftar Produk</h2>
  <table id="tabelProduk"> 
    <thead>
      <tr>
        <th>Nama</th>
        <th>Harga Beli</th>
        <th>Harga Jual</th>
        <th style="background:#f1f1f1;">Stok</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="box">
  <h2>Penjualan</h2>
  <label>Pilih Produk</label>
  <select id="pilihProduk"></select>

  <label>Jumlah</label>
  <input type="number" id="jumlahJual" />

  <button class="success" onclick="jualProduk()">Jual</button>
  <button onclick="cetakStruk()">Cetak Struk</button>
</div>

<div class="box">
  <h2>Riwayat Penjualan</h2>
  <table id="tabelPenjualan">
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Produk</th>
        <th>Jumlah</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  function formatInputRupiah(el) {
    let angka = el.value.replace(/[^0-9]/g, '');
    if (!angka) {
      el.value = '';
      return;
    }
    el.value = 'Rp ' + parseInt(angka).toLocaleString('id-ID');
  }

  function bersihkanRupiah(teks) {
    return parseInt(teks.replace(/[^0-9]/g, '')) || 0;
  }

  // === LOAD DATA DARI LOCALSTORAGE ===
  let produk = JSON.parse(localStorage.getItem('produk')) || [];
  let penjualan = JSON.parse(localStorage.getItem('penjualan')) || [];
  let strukTerakhir = null;

  function formatRupiah(angka) {
    return 'Rp ' + angka.toLocaleString('id-ID');
  }

  function simpanData() {
    localStorage.setItem('produk', JSON.stringify(produk));
    localStorage.setItem('penjualan', JSON.stringify(penjualan));
  }

  function tambahProduk() {
    const nama = namaProduk.value;
    const beli = bersihkanRupiah(hargaBeli.value);
    const jual = bersihkanRupiah(hargaJual.value);
    const stokVal = parseInt(stok.value);

    const namaExist = produk.some(p => p.nama.toLowerCase() === nama.toLowerCase());

    if (namaExist) {
      alert('Nama produk sudah ada, silakan gunakan nama lain');
      return;
    }

    if (!nama || jual <= beli) {
      alert('Nama harus diisi & harga jual harus lebih mahal dari harga beli');
      return;
    }

    produk.push({ nama, beli, jual, stok: stokVal });
    renderProduk();
    simpanData();
    namaProduk.value = hargaBeli.value = hargaJual.value = stok.value = '';
  }

  function renderProduk() {
    const tbody = document.querySelector('#tabelProduk tbody');
    const select = pilihProduk;
    tbody.innerHTML = '';
    select.innerHTML = '';

    produk.forEach((p, i) => {
      tbody.innerHTML += `
        <tr>
          <td>${p.nama}</td>
          <td>${formatRupiah(p.beli)}</td>
          <td>${formatRupiah(p.jual)}</td>
          <td style="background:${p.stok == 0 ? '#f8d7da' : '#e8f5e9'}; color:${p.stok == 0 ? '#721c24' : '#1b5e20'}; font-weight:bold;">${p.stok}</td>
          <td>
            <button onclick="editStok(${i})">Edit Stok</button>
            <button class="danger" onclick="hapusProduk(${i})">Hapus</button>
          </td>
        </tr>`;

      select.innerHTML += `<option value="${i}">${p.nama}</option>`;
    });
  }

  function editStok(i) {
    const p = produk[i];
    const stokBaru = prompt('Update Stok untuk ' + p.nama, p.stok);

    if (stokBaru === null) return;

    const stokAngka = parseInt(stokBaru);
    if (isNaN(stokAngka) || stokAngka < 0) {
      alert('Stok harus berupa angka dan tidak boleh minus');
      return;
    }

    p.stok = stokAngka;
    renderProduk();
    simpanData();
  }

  function hapusProduk(i) {
    produk.splice(i,1);
    renderProduk();
    simpanData();
  }

  function jualProduk() {
    const i = pilihProduk.value;
    const jumlah = parseInt(jumlahJual.value);
    const p = produk[i];

    if (jumlah > p.stok) {
      alert('Stok tidak cukup');
      return;
    }

    p.stok -= jumlah;
    const total = jumlah * p.jual;
    strukTerakhir = {
      tanggal: new Date().toLocaleString(),
      nama: p.nama,
      jumlah,
      harga: p.jual,
      total
    };

    penjualan.push({
      tanggal: new Date().toLocaleString(),
      nama: p.nama,
      jumlah,
      total
    });

    renderProduk();
    simpanData();
    renderPenjualan();
    simpanData();
    jumlahJual.value = '';
  }

  function cetakStruk() {
    if (!strukTerakhir) {
      alert('Belum ada transaksi');
      return;
    }

    const s = strukTerakhir;
    const win = window.open('', '', 'width=300,height=500');
    win.document.write(`
      <html><head><title>Struk</title>
      <style>
        body { font-family: monospace; }
        h3 { text-align:center; }
        hr { border:1px dashed #000; }
      </style>
      </head><body>
      <h3>STRUK PEMBELIAN</h3>
      <hr>
      <p>Tanggal: ${s.tanggal}</p>
      <p>Produk : ${s.nama}</p>
      <p>Jumlah : ${s.jumlah}</p>
      <p>Harga  : ${formatRupiah(s.harga)}</p>
      <hr>
      <h3>Total: ${formatRupiah(s.total)}</h3>
      <hr>
      <p style="text-align:center">Terima Kasih</p>
      </body></html>
    `);
    win.document.close();
    win.print();
  }

  function renderPenjualan() {
    const tbody = document.querySelector('#tabelPenjualan tbody');
    tbody.innerHTML = '';

    penjualan.forEach(p => {
      tbody.innerHTML += `
        <tr>
          <td>${p.tanggal}</td>
          <td>${p.nama}</td>
          <td>${p.jumlah}</td>
          <td>${formatRupiah(p.total)}</td>
        </tr>`;
    });
  }
  // render awal saat halaman dibuka
  renderProduk();
  renderPenjualan();
</script>

</body>
</html>
